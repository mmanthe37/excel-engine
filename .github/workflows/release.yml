name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: ExcelEngine-macOS.zip
            app_name: "Excel Engine"
          - os: windows-latest
            artifact_name: ExcelEngine-Windows.zip
            app_name: ExcelEngine
          - os: ubuntu-latest
            artifact_name: ExcelEngine-Linux.tar.gz
            app_name: excel-engine-gui

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install -r gui/requirements.txt
          pip install pyinstaller

      - name: Build standalone executable
        run: python gui/build_app.py

      # --- macOS Code Signing & Notarization ---
      - name: Import Apple certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Set partition list for codesign access
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Cleanup
          rm -f /tmp/certificate.p12

      - name: Sign macOS app
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        run: python gui/build_app.py --sign-only

      - name: Notarize macOS app
        if: runner.os == 'macOS' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          APP_PATH="dist/Excel Engine.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="dist/Excel Engine"
          fi

          # Create zip for notarization
          ditto -c -k --keepParent "$APP_PATH" /tmp/notarize.zip

          # Submit and wait
          xcrun notarytool submit /tmp/notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --wait

          # Staple ticket
          xcrun stapler staple "$APP_PATH"
          rm -f /tmp/notarize.zip

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          if [ -d "Excel Engine.app" ]; then
            zip -r "../${{ matrix.artifact_name }}" "Excel Engine.app"
          else
            zip -r "../${{ matrix.artifact_name }}" "Excel Engine"
          fi

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist\${{ matrix.app_name }}" -DestinationPath "${{ matrix.artifact_name }}"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.artifact_name }}" -C dist "${{ matrix.app_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

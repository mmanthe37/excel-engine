name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: ExcelEngine-macOS.zip
            app_name: "Excel Engine"
          - os: windows-latest
            artifact_name: ExcelEngine-Windows.zip
            app_name: ExcelEngine
          - os: ubuntu-latest
            artifact_name: ExcelEngine-Linux.tar.gz
            app_name: excel-engine-gui

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install -r gui/requirements.txt
          pip install pyinstaller

      - name: Build standalone executable
        run: python gui/build_app.py

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          if [ -d "Excel Engine.app" ]; then
            zip -r "../${{ matrix.artifact_name }}" "Excel Engine.app"
          else
            zip -r "../${{ matrix.artifact_name }}" "Excel Engine"
          fi

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist\${{ matrix.app_name }}" -DestinationPath "${{ matrix.artifact_name }}"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.artifact_name }}" -C dist "${{ matrix.app_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

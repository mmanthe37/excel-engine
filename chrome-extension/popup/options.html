<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Excel Engine — Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-top: 16px; margin-bottom: 4px; font-size: 13px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px;
    }
    .hint { font-size: 11px; color: #718096; margin-top: 2px; }
    button { margin-top: 20px; padding: 10px 24px; background: #2b6cb0; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #2c5282; }
    .saved { color: #38a169; font-size: 12px; margin-left: 8px; display: none; }
  </style>
</head>
<body>
  <h1>⚙️ Excel Engine Settings</h1>

  <label for="server-url">Server URL</label>
  <input type="text" id="server-url" value="http://localhost:8080">
  <p class="hint">URL of your Excel Engine MCP server (copilot-studio-connector or mcp-server)</p>

  <label for="api-key">API Key</label>
  <input type="password" id="api-key" placeholder="Leave blank for no auth">
  <p class="hint">Set EXCEL_ENGINE_API_KEY on your server to enable authentication</p>

  <button id="save-btn">Save</button>
  <span class="saved" id="saved-msg">✓ Saved</span>

  <script>
    chrome.storage.sync.get({ serverURL: 'http://localhost:8080', apiKey: '' }, (items) => {
      document.getElementById('server-url').value = items.serverURL;
      document.getElementById('api-key').value = items.apiKey;
    });

    document.getElementById('save-btn').addEventListener('click', () => {
      chrome.storage.sync.set({
        serverURL: document.getElementById('server-url').value,
        apiKey: document.getElementById('api-key').value,
      }, () => {
        const msg = document.getElementById('saved-msg');
        msg.style.display = 'inline';
        setTimeout(() => { msg.style.display = 'none'; }, 2000);
      });
    });
  </script>
</body>
</html>
